default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  url: <%= ENV['DATABASE_URL'] %>

development:
  <<: *default

test:
  <<: *default
  url: <%= ENV.fetch('DATABASE_URL_TEST', ENV['DATABASE_URL']) %>

production:
  <<: *default
  url: <%= ENV['DATABASE_URL'] %>