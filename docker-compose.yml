services:
  db:
    image: postgres:16
    container_name: tvbh-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tvbh_development
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tvbh_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: tvbh-web
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@db:5432/tvbh_development
      DATABASE_URL_TEST: postgres://postgres:postgres@db:5432/tvbh_test
    ports:
      - "3000:3000"
      - "3036:3036"
    volumes:
      - .:/rails
      - bundle-cache:/usr/local/bundle
      - bun-cache:/root/.bun
    tty: true
    stdin_open: true
    command: sleep infinity

volumes:
  postgres-data:
  bundle-cache:
  bun-cache:
